<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pipeline Dashboard — Live State</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #1a1a1a;
      color: #e0e0e0;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .dashboard-container {
      background-color: #252525;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      padding: 30px;
      width: 100%;
      max-width: 900px;
      box-sizing: border-box;
    }
    h1 {
      color: #4a9eff;
      text-align: center;
      margin-bottom: 25px;
      font-size: 2em;
      border-bottom: 2px solid #333;
      padding-bottom: 10px;
    }
    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .status-card {
      background-color: #333;
      padding: 15px 20px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 80px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }
    .status-card .label {
      font-size: 0.9em;
      color: #bbb;
      margin-bottom: 5px;
    }
    .status-card .value {
      font-size: 1.2em;
      font-weight: bold;
      color: #fff;
    }
    .status-card.status-running .value { color: #4CAF50; }
    .status-card.status-stopped .value { color: #9E9E9E; }
    #error {
      background-color: #ff4444;
      color: white;
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
      font-weight: bold;
    }
    .footer {
      margin-top: 30px;
      font-size: 0.8em;
      color: #888;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="dashboard-container">
    <h1>Pipeline Dashboard — Live State</h1>
    
    <div class="status-grid">
      <div class="status-card" id="statusCard">
        <div class="label">Status</div>
        <div class="value" id="status">Loading...</div>
      </div>
      
      <div class="status-card">
        <div class="label">Queries Completed</div>
        <div class="value" id="queriesCompleted">—</div>
      </div>
      
      <div class="status-card">
        <div class="label">Total Queries</div>
        <div class="value" id="totalQueries">—</div>
      </div>
      
      <div class="status-card">
        <div class="label">Current Query</div>
        <div class="value" id="currentQuery">—</div>
      </div>
      
      <div class="status-card">
        <div class="label">Images Found</div>
        <div class="value" id="imagesFound">—</div>
      </div>
      
      <div class="status-card">
        <div class="label">Last Update</div>
        <div class="value" id="lastUpdate">—</div>
      </div>
    </div>
    
    <div class="status-card">
      <div class="label">Note</div>
      <div class="value" id="note">—</div>
    </div>
    
    <div id="error" style="display:none;color:red"></div>
    
    <div class="footer">
      Polling every 2 seconds from http://localhost:3333/api/pipeline/state
    </div>
  </div>

  <script>
    // ======================================================
    // PIPELINE DASHBOARD — LIVE STATE WIRING (NO LIES)
    // ======================================================
    //
    // This block makes the dashboard reflect EXACTLY what
    // pipeline-control/state.json contains.
    // No fake timers. No derived math. No guessing.
    //
    // ======================================================

    async function pollPipelineState() {
      try {
        const res = await fetch("http://localhost:3333/api/pipeline/state");
        const state = await res.json();

        // 🔴 DIRECT BINDINGS — NO MATH
        const statusEl = document.getElementById("status");
        statusEl.innerText = state.running ? "RUNNING" : "STOPPED";
        
        // Update status card class
        const statusCard = document.getElementById("statusCard");
        statusCard.className = `status-card status-${state.running ? "running" : "stopped"}`;

        document.getElementById("queriesCompleted").innerText =
          state.queriesCompleted ?? 0;

        document.getElementById("totalQueries").innerText =
          state.totalQueries ?? state.total_queries ?? 0;

        document.getElementById("currentQuery").innerText =
          state.currentQuery ?? "idle";

        document.getElementById("imagesFound").innerText =
          state.images ?? state.images_found ?? 0;

        document.getElementById("lastUpdate").innerText =
          state.lastUpdate ?? "never";

        document.getElementById("note").innerText =
          state.note ?? "";

        // 🔴 STALL VISIBILITY (IMPORTANT)
        const errorEl = document.getElementById("error");
        if (state.last_error) {
          errorEl.innerText = state.last_error;
          errorEl.style.display = "block";
        } else {
          errorEl.style.display = "none";
        }

      } catch (err) {
        console.error("Dashboard poll failed:", err.message);
        document.getElementById("status").innerText = "ERROR";
        document.getElementById("error").innerText = `Poll failed: ${err.message}`;
        document.getElementById("error").style.display = "block";
      }
    }

    // 🔁 POLL EVERY 2 SECONDS (REAL TIME)
    setInterval(pollPipelineState, 2000);
    pollPipelineState();
  </script>
</body>
</html>

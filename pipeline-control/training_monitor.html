<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training State Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #4CAF50;
            margin-bottom: 10px;
        }
        .status {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .status-idle {
            border-color: #666;
        }
        .status-training {
            border-color: #4CAF50;
            animation: pulse 2s infinite;
        }
        .status-complete {
            border-color: #2196F3;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .metric {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #333;
        }
        .metric:last-child {
            border-bottom: none;
        }
        .metric-label {
            color: #aaa;
            font-weight: 500;
        }
        .metric-value {
            color: #fff;
            font-weight: 600;
        }
        .progress-bar {
            width: 100%;
            height: 30px;
            background: #333;
            border-radius: 15px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
            font-size: 12px;
        }
        .timestamp {
            color: #888;
            font-size: 12px;
            margin-top: 10px;
            text-align: right;
        }
        .error {
            color: #f44336;
            background: #2a1a1a;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Training State Monitor</h1>
        <div id="status" class="status status-idle">
            <div class="metric">
                <span class="metric-label">Status:</span>
                <span class="metric-value" id="status-value">Loading...</span>
            </div>
            <div class="metric">
                <span class="metric-label">Epoch:</span>
                <span class="metric-value" id="epoch">-</span>
            </div>
            <div class="metric">
                <span class="metric-label">Step:</span>
                <span class="metric-value" id="step">-</span>
            </div>
            <div class="metric">
                <span class="metric-label">Loss:</span>
                <span class="metric-value" id="loss">-</span>
            </div>
            <div class="metric">
                <span class="metric-label">Accuracy:</span>
                <span class="metric-value" id="accuracy">-</span>
            </div>
            <div class="metric">
                <span class="metric-label">Dataset Size:</span>
                <span class="metric-value" id="dataset-size">-</span>
            </div>
            <div id="progress-container" style="display: none;">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill">0%</div>
                </div>
            </div>
            <div class="timestamp" id="timestamp">-</div>
            <div id="note" style="margin-top: 10px; color: #aaa; font-style: italic;"></div>
        </div>
    </div>

    <script>
        // Always use full URL to avoid CORS issues
        const API_URL = 'http://localhost:3333/api/training/state';
        
        function updateStatus() {
            fetch(API_URL, {
                method: 'GET',
                mode: 'cors',
                headers: {
                    'Accept': 'application/json'
                }
            })
                .then(res => {
                    if (!res.ok) {
                        throw new Error(`HTTP ${res.status}: ${res.statusText}`);
                    }
                    return res.json();
                })
                .then(data => {
                    // Update status
                    const statusEl = document.getElementById('status');
                    const statusValue = data.status || 'unknown';
                    document.getElementById('status-value').textContent = statusValue.toUpperCase();
                    
                    // Update status class
                    statusEl.className = 'status status-' + statusValue;
                    
                    // Update metrics
                    // Epoch display
                    const epochValue = data.epoch !== undefined && data.epoch !== null ? data.epoch : 0;
                    const totalEpochs = data.totalEpochs !== undefined && data.totalEpochs !== null ? data.totalEpochs : 0;
                    document.getElementById('epoch').textContent = 
                        totalEpochs > 0 
                            ? `${epochValue} / ${totalEpochs}`
                            : epochValue.toString();
                    
                    // Step display
                    const stepValue = data.step !== undefined && data.step !== null ? data.step : 0;
                    const totalSteps = data.totalSteps !== undefined && data.totalSteps !== null ? data.totalSteps : 0;
                    document.getElementById('step').textContent = 
                        totalSteps > 0
                            ? `${stepValue} / ${totalSteps}`
                            : stepValue.toString();
                    
                    // Loss display
                    const lossValue = data.loss !== null && data.loss !== undefined ? data.loss : null;
                    document.getElementById('loss').textContent = 
                        lossValue !== null 
                            ? lossValue.toFixed(4) 
                            : '-';
                    
                    // Accuracy display
                    const accuracyValue = data.accuracy !== null && data.accuracy !== undefined ? data.accuracy : null;
                    document.getElementById('accuracy').textContent = 
                        accuracyValue !== null 
                            ? (accuracyValue * 100).toFixed(2) + '%' 
                            : '-';
                    
                    // Dataset size display
                    const datasetSize = data.datasetSize !== undefined && data.datasetSize !== null ? data.datasetSize : 0;
                    document.getElementById('dataset-size').textContent = 
                        datasetSize > 0 ? datasetSize.toLocaleString() : '0';
                    
                    // Update progress bar
                    if (data.totalEpochs > 0) {
                        const progress = ((data.epoch || 0) / data.totalEpochs) * 100;
                        document.getElementById('progress-container').style.display = 'block';
                        document.getElementById('progress-fill').style.width = progress + '%';
                        document.getElementById('progress-fill').textContent = progress.toFixed(1) + '%';
                    } else {
                        document.getElementById('progress-container').style.display = 'none';
                    }
                    
                    // Update timestamp
                    if (data.lastUpdate) {
                        const date = new Date(data.lastUpdate);
                        document.getElementById('timestamp').textContent = 
                            'Last update: ' + date.toLocaleString();
                    }
                    
                    // Update note
                    document.getElementById('note').textContent = data.note || '';
                })
                .catch(err => {
                    console.error('Fetch error:', err);
                    const statusEl = document.getElementById('status');
                    statusEl.className = 'status status-idle';
                    document.getElementById('status-value').textContent = 'ERROR';
                    document.getElementById('status').innerHTML = 
                        '<div class="error">Failed to fetch training state: ' + err.message + '</div>' +
                        '<div style="margin-top: 10px; color: #888; font-size: 12px;">' +
                        'Make sure the server is running: <code>node pipeline-control/server.js</code><br>' +
                        'API URL: ' + API_URL +
                        '</div>';
                });
        }
        
        // Update immediately and then every 2 seconds
        updateStatus();
        setInterval(updateStatus, 2000);
    </script>
</body>
</html>
